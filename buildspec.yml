version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws --version
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 342573629846.dkr.ecr.us-east-1.amazonaws.com

  build:
    commands:
      - echo Building the Docker image...
      - docker build -t webapp .
      - docker tag webapp:latest 342573629846.dkr.ecr.us-east-1.amazonaws.com/webapp:latest

  post_build:
    commands:
      - echo Pushing the Docker image...
      - docker push 342573629846.dkr.ecr.us-east-1.amazonaws.com/webapp:latest
