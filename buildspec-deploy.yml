version: 0.2
# =============================================================
#  buildspec/buildspec-deploy.yml
#  Stage 3: Deploy to EKS with automatic rollback on failure
# =============================================================

env:
  variables:
    AWS_DEFAULT_REGION: "us-east-1"
    EKS_CLUSTER_NAME: "webapp-cluster"
    IMAGE_REPO_NAME: "webapp"
    DEPLOYMENT_NAME: "webapp"
    NAMESPACE: "default"

phases:
  pre_build:
    commands:
      - echo "Configuring kubectl for EKS..."
      - aws eks update-kubeconfig --region $AWS_DEFAULT_REGION --name $EKS_CLUSTER_NAME
      - kubectl version --client
      - AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_REPO_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - IMAGE_TAG=$(cat imagedefinitions.json | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['imageUri'].split(':')[1])")
      - echo "Deploying image tag $IMAGE_TAG"

  build:
    commands:
      - echo "Applying Kubernetes manifests..."

      # Substitute placeholders in deployment.yaml
      - sed -i "s|ACCOUNT_ID|$AWS_ACCOUNT_ID|g" k8s/deployment.yaml
      - sed -i "s|IMAGE_TAG|$IMAGE_TAG|g" k8s/deployment.yaml

      # Apply service first (idempotent)
      - kubectl apply -f k8s/service.yaml

      # Record the current revision for rollback
      - PREVIOUS_REVISION=$(kubectl rollout history deployment/$DEPLOYMENT_NAME -n $NAMESPACE --no-headers 2>/dev/null | tail -1 | awk '{print $1}' || echo "0")
      - echo "Previous revision $PREVIOUS_REVISION"

      # Apply deployment
      - kubectl apply -f k8s/deployment.yaml

      # Wait for rollout — if it fails, roll back automatically
      - |
        if ! kubectl rollout status deployment/$DEPLOYMENT_NAME -n $NAMESPACE --timeout=180s; then
          echo "❌ Deployment failed! Rolling back..."
          kubectl rollout undo deployment/$DEPLOYMENT_NAME -n $NAMESPACE
          kubectl rollout status deployment/$DEPLOYMENT_NAME -n $NAMESPACE --timeout=120s
          echo "✅ Rollback complete."
          exit 1
        fi

  post_build:
    commands:
      - echo "✅ Deployment successful!"
      - kubectl get pods -n $NAMESPACE -l app=webapp
      - kubectl get service webapp-service -n $NAMESPACE
